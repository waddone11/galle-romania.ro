                  - paragraph [ref=e290]: Timpul de livrare depinde de stoc, localitate, cantitate și traseul de transport. Galle Silva oferă livrare pentru lemn de foc în Prahova, Ilfov și București, iar termenul concret se confirmă la comandă.
