                - article [ref=e176]:
                  - heading "Cât lemn de foc îmi trebuie pentru o iarnă?" [level=3] [ref=e177]:
                    - button "Cât lemn de foc îmi trebuie pentru o iarnă?" [ref=e178]:
                      - generic [ref=e179]: Cât lemn de foc îmi trebuie pentru o iarnă?
                      - img [ref=e181]
                  - paragraph [ref=e183]: Pentru o casă standard de 100 m² cu termoizolație bună, calculăm aproximativ 5–7 metri steri de esență tare. Apartamentele sau casele bine izolate consumă 3–5 steri. Putem ajusta în funcție de zona ta climatică și tipul de sobă/cazan.
                - article [ref=e184]:
                  - heading "Lemnul de foc este uscat sau trebuie lăsat la uscat?" [level=3] [ref=e185]:
                    - button "Lemnul de foc este uscat sau trebuie lăsat la uscat?" [ref=e186]:
                      - generic [ref=e187]: Lemnul de foc este uscat sau trebuie lăsat la uscat?
                      - img [ref=e189]
                  - paragraph [ref=e191]: Lemnul de foc poate fi livrat în stadii diferite de uscare, iar acest lucru trebuie confirmat înainte de comandă. Galle Silva livrează lemn de foc de esență tare — stejar, carpen și fag — în Prahova, Ilfov și București, iar la ofertare îți spunem clar ce tip de lemn este disponibil.
                - article [ref=e192]:
                  - heading "Pot arde lemn proaspăt tăiat în sobă sau centrală?" [level=3] [ref=e193]:
                    - button "Pot arde lemn proaspăt tăiat în sobă sau centrală?" [ref=e194]:
                      - generic [ref=e195]: Pot arde lemn proaspăt tăiat în sobă sau centrală?
                      - img [ref=e197]
                  - paragraph [ref=e199]: Lemnul proaspăt tăiat nu este ideal pentru ardere imediată, deoarece conține mai multă umiditate, pornește mai greu și poate produce mai mult fum. Pentru randament mai bun, lemnul trebuie crăpat, depozitat aerisit și lăsat să se usuce înainte de folosire.
                - article [ref=e200]:
                  - heading "De ce scoate lemnul mult fum când îl bag pe foc?" [level=3] [ref=e201]:
                    - button "De ce scoate lemnul mult fum când îl bag pe foc?" [ref=e202]:
                      - generic [ref=e203]: De ce scoate lemnul mult fum când îl bag pe foc?
                      - img [ref=e205]
                  - paragraph [ref=e207]: Lemnul scoate mult fum de obicei când este prea umed, când focarul nu are tiraj bun sau când lemnul este așezat prea compact. Lemnul de esență tare arde bine doar dacă este depozitat corect și are suficient aer în timpul arderii.
                - article [ref=e208]:
                  - heading "Cum depozitez lemnul de foc afară fără să mucegăiască?" [level=3] [ref=e209]:
                    - button "Cum depozitez lemnul de foc afară fără să mucegăiască?" [ref=e210]:
                      - generic [ref=e211]: Cum depozitez lemnul de foc afară fără să mucegăiască?
                      - img [ref=e213]
                  - paragraph [ref=e215]: Lemnul de foc se depozitează ridicat de la sol, acoperit deasupra și lăsat deschis lateral pentru aerisire. Nu este recomandat să fie învelit complet în folie, deoarece umezeala rămâne blocată și poate apărea mucegai.
                - article [ref=e216]:
                  - heading "Lemnul de foc se cumpără mai bine la volum sau la greutate?" [level=3] [ref=e217]:
                    - button "Lemnul de foc se cumpără mai bine la volum sau la greutate?" [ref=e218]:
                      - generic [ref=e219]: Lemnul de foc se cumpără mai bine la volum sau la greutate?
                      - img [ref=e221]
                  - paragraph [ref=e223]: Pentru lemnul de foc, volumul este de obicei mai relevant decât greutatea, deoarece lemnul verde cântărește mai mult din cauza apei. Când compari oferte, cere clar unitatea de măsură, forma de livrare și dacă transportul este inclus.
                - article [ref=e224]:
                  - heading "Cât ține un metru cub de lemn de foc?" [level=3] [ref=e225]:
                    - button "Cât ține un metru cub de lemn de foc?" [ref=e226]:
                      - generic [ref=e227]: Cât ține un metru cub de lemn de foc?
                      - img [ref=e229]
                  - paragraph [ref=e231]: Un metru cub de lemn poate ține foarte diferit în funcție de casă, izolație, sobă sau centrală, temperatură și cât de uscat este lemnul. Galle Silva poate livra fără cantitate minimă, astfel încât poți comanda gradual în funcție de consum.
                - article [ref=e232]:
                  - heading "Câte lăzi sau paleți înseamnă un metru cub de lemn?" [level=3] [ref=e233]:
                    - button "Câte lăzi sau paleți înseamnă un metru cub de lemn?" [ref=e234]:
                      - generic [ref=e235]: Câte lăzi sau paleți înseamnă un metru cub de lemn?
                      - img [ref=e237]
                  - paragraph [ref=e239]: Numărul de lăzi sau paleți depinde de dimensiunea ambalajului și de modul în care este așezat lemnul. Cel mai corect este să verifici volumul declarat pentru fiecare ladă/palet, nu doar numărul de bucăți sau greutatea.
                - article [ref=e240]:
                  - heading "Care este diferența dintre lemn de foc și lemn pentru construcții?" [level=3] [ref=e241]:
                    - button "Care este diferența dintre lemn de foc și lemn pentru construcții?" [ref=e242]:
                      - generic [ref=e243]: Care este diferența dintre lemn de foc și lemn pentru construcții?
                      - img [ref=e245]
                  - paragraph [ref=e247]: Lemnul de foc este destinat arderii și se vinde pentru putere calorică, esență, dimensiune și grad de uscare. Lemnul pentru construcții trebuie să respecte alte cerințe de calitate, uscare, debitare și rezistență, deci nu trebuie confundat cu lemnul de foc.
                - article [ref=e248]:
                  - heading "Pot comanda lemn de foc și cantitate mică?" [level=3] [ref=e249]:
                    - button "Pot comanda lemn de foc și cantitate mică?" [ref=e250]:
                      - generic [ref=e251]: Pot comanda lemn de foc și cantitate mică?
                      - img [ref=e253]
                  - paragraph [ref=e255]: Da, Galle Silva nu impune cantitate minimă pentru lemnul de foc. Livrăm în Prahova, Ilfov și București, iar prețul pornește de la 350 lei/m³, în funcție de comandă, disponibilitate și transport.
